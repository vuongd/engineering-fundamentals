name: AI Studio PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          git --no-pager diff --unified=0 \
            "origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }}" \
            > pr.diff || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip requests

      - name: Call Gemini for PR summary
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MAX_TOKENS: ${{ vars.MAX_TOKENS || '800' }}
        run: |
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "GOOGLE_API_KEY is not available for this workflow run."
            echo "Skipping AI review."
            exit 0
          fi

          python .github/actions/call-ai-studio/call_ai_api_key.py \
            --api-key "$GOOGLE_API_KEY" \
            --model "gemini-3-flash-preview" \
            --diff-file "pr.diff" \
            --max-tokens "$MAX_TOKENS" \
            --out-file "pr_summary.txt"

      - name: Post PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f pr_summary.txt ]; then
            echo "No PR summary generated."
            exit 0
          fi

          BODY=$(jq -Rs . < pr_summary.txt)
          API="https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"

          curl --fail --silent --show-error \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            --data "{\"body\": $BODY}" \
            "$API"