name: AI Studio PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          git checkout ${{ github.event.pull_request.head.sha }}
          git --no-pager diff --unified=0 origin/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }} > pr.diff || true
          echo "diff_path=pr.diff" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip requests

      - name: Call AI Studio for PR summary
        id: ai
        run: |
          python .github/actions/call-ai-studio/call_ai_api_key.py \
            --api-key "${{ secrets.GOOGLE_API_KEY }}" \
            --model gemini-3-flash-preview \
            --diff-file pr.diff \
            --max-tokens "${{ secrets.MAX_TOKENS || '800' }}" \
            --out-file pr_summary.txt

      - name: Post PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(jq -Rs . < pr_summary.txt)
          API="https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"
          curl -s -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/json" --data "{\"body\": $BODY}" $API
